<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Skyline - Stormy Night</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="scene-container">
    <svg id="skyline-scene" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
      <defs>
        <!-- Stormy sky gradient -->
        <linearGradient id="sky-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1a0a2e"/>
          <stop offset="50%" stop-color="#2d1b4e"/>
          <stop offset="100%" stop-color="#0f1729"/>
        </linearGradient>
        
        <!-- Building gradient -->
        <linearGradient id="building-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1a1a2e"/>
          <stop offset="100%" stop-color="#0a0a15"/>
        </linearGradient>
        
        <!-- Lightning glow -->
        <filter id="lightning-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      
      <!-- Background -->
      <rect id="background" width="100%" height="100%" fill="url(#sky-gradient)"/>
      
      <!-- Flash overlay for lightning -->
      <rect id="flash-overlay" width="100%" height="100%" fill="#ffffff" opacity="0"/>
      
      <!-- City Skyline -->
      <g id="skyline">
        <!-- Building 1 - Tall skyscraper left -->
        <path class="building" d="M50,800 L50,350 L100,350 L100,300 L130,280 L130,350 L180,350 L180,800 Z" fill="url(#building-gradient)"/>
        <g class="windows">
          <rect class="window" x="60" y="370" width="15" height="20"/>
          <rect class="window" x="90" y="370" width="15" height="20"/>
          <rect class="window" x="140" y="370" width="15" height="20"/>
          <rect class="window" x="60" y="410" width="15" height="20"/>
          <rect class="window" x="90" y="410" width="15" height="20"/>
          <rect class="window" x="140" y="410" width="15" height="20"/>
          <rect class="window" x="60" y="450" width="15" height="20"/>
          <rect class="window" x="90" y="450" width="15" height="20"/>
          <rect class="window" x="140" y="450" width="15" height="20"/>
          <rect class="window" x="60" y="490" width="15" height="20"/>
          <rect class="window" x="90" y="490" width="15" height="20"/>
          <rect class="window" x="140" y="490" width="15" height="20"/>
        </g>
        
        <!-- Building 2 - Medium with spire -->
        <path class="building" d="M180,800 L180,400 L220,400 L220,380 L240,360 L240,380 L260,380 L260,400 L300,400 L300,800 Z" fill="url(#building-gradient)"/>
        <line class="antenna" x1="240" y1="360" x2="240" y2="320" stroke="#333" stroke-width="3"/>
        <circle class="antenna-light" cx="240" cy="320" r="3" fill="#ff0000"/>
        
        <!-- Building 3 - Stepped building -->
        <path class="building" d="M300,800 L300,450 L330,450 L330,420 L360,420 L360,380 L390,380 L390,350 L430,350 L430,800 Z" fill="url(#building-gradient)"/>
        
        <!-- Building 4 - Tall central tower -->
        <path class="building" d="M430,800 L430,320 L480,320 L480,280 L520,240 L520,280 L570,280 L570,320 L620,320 L620,800 Z" fill="url(#building-gradient)"/>
        <line class="antenna" x1="520" y1="240" x2="520" y2="190" stroke="#333" stroke-width="4"/>
        <circle class="antenna-light" cx="520" cy="190" r="4" fill="#ff0000"/>
        <g class="windows">
          <rect class="window" x="450" y="350" width="20" height="25"/>
          <rect class="window" x="490" y="350" width="20" height="25"/>
          <rect class="window" x="540" y="350" width="20" height="25"/>
          <rect class="window" x="450" y="400" width="20" height="25"/>
          <rect class="window" x="490" y="400" width="20" height="25"/>
          <rect class="window" x="540" y="400" width="20" height="25"/>
          <rect class="window" x="450" y="450" width="20" height="25"/>
          <rect class="window" x="490" y="450" width="20" height="25"/>
          <rect class="window" x="540" y="450" width="20" height="25"/>
          <rect class="window" x="450" y="500" width="20" height="25"/>
          <rect class="window" x="490" y="500" width="20" height="25"/>
          <rect class="window" x="540" y="500" width="20" height="25"/>
        </g>
        
        <!-- Building 5 - Medium width -->
        <path class="building" d="M620,800 L620,420 L670,420 L670,380 L710,380 L710,420 L760,420 L760,800 Z" fill="url(#building-gradient)"/>
        
        <!-- Building 6 - Wide building with details -->
        <path class="building" d="M760,800 L760,460 L800,460 L800,430 L840,430 L840,460 L880,460 L880,430 L920,430 L920,460 L960,460 L960,500 L1000,500 L1000,460 L1050,460 L1050,800 Z" fill="url(#building-gradient)"/>
        
        <!-- Building 7 - Rightmost tall -->
        <path class="building" d="M1050,800 L1050,360 L1100,360 L1100,310 L1150,310 L1150,360 L1200,360 L1200,800 Z" fill="url(#building-gradient)"/>
        <line class="antenna" x1="1100" y1="310" x2="1100" y2="270" stroke="#333" stroke-width="3"/>
        <circle class="antenna-light" cx="1100" cy="270" r="3" fill="#ff0000"/>
      </g>
      
      <!-- Rain layer -->
      <g id="rain">
        <line class="raindrop" x1="100" y1="50" x2="95" y2="80"/>
        <line class="raindrop" x1="200" y1="80" x2="195" y2="110"/>
        <line class="raindrop" x1="300" y1="30" x2="295" y2="60"/>
        <line class="raindrop" x1="400" y1="100" x2="395" y2="130"/>
        <line class="raindrop" x1="500" y1="60" x2="495" y2="90"/>
        <line class="raindrop" x1="600" y1="90" x2="595" y2="120"/>
        <line class="raindrop" x1="700" y1="40" x2="695" y2="70"/>
        <line class="raindrop" x1="800" y1="110" x2="795" y2="140"/>
        <line class="raindrop" x1="900" y1="70" x2="895" y2="100"/>
        <line class="raindrop" x1="1000" y1="50" x2="995" y2="80"/>
        <line class="raindrop" x1="1100" y1="90" x2="1095" y2="120"/>
        <line class="raindrop" x1="150" y1="150" x2="145" y2="180"/>
        <line class="raindrop" x1="250" y1="180" x2="245" y2="210"/>
        <line class="raindrop" x1="350" y1="130" x2="345" y2="160"/>
        <line class="raindrop" x1="450" y1="200" x2="445" y2="230"/>
        <line class="raindrop" x1="550" y1="160" x2="545" y2="190"/>
        <line class="raindrop" x1="650" y1="190" x2="645" y2="220"/>
        <line class="raindrop" x1="750" y1="140" x2="745" y2="170"/>
        <line class="raindrop" x1="850" y1="210" x2="845" y2="240"/>
        <line class="raindrop" x1="950" y1="170" x2="945" y2="200"/>
        <line class="raindrop" x1="1050" y1="150" x2="1045" y2="180"/>
        <line class="raindrop" x1="1150" y1="190" x2="1145" y2="220"/>
        <line class="raindrop" x1="120" y1="250" x2="115" y2="280"/>
        <line class="raindrop" x1="220" y1="280" x2="215" y2="310"/>
        <line class="raindrop" x1="320" y1="230" x2="315" y2="260"/>
        <line class="raindrop" x1="420" y1="300" x2="415" y2="330"/>
        <line class="raindrop" x1="520" y1="260" x2="515" y2="290"/>
        <line class="raindrop" x1="620" y1="290" x2="615" y2="320"/>
        <line class="raindrop" x1="720" y1="240" x2="715" y2="270"/>
        <line class="raindrop" x1="820" y1="310" x2="815" y2="340"/>
        <line class="raindrop" x1="920" y1="270" x2="915" y2="300"/>
        <line class="raindrop" x1="1020" y1="250" x2="1015" y2="280"/>
        <line class="raindrop" x1="1120" y1="290" x2="1115" y2="320"/>
        <line class="raindrop" x1="180" y1="350" x2="175" y2="380"/>
        <line class="raindrop" x1="280" y1="380" x2="275" y2="410"/>
        <line class="raindrop" x1="380" y1="330" x2="375" y2="360"/>
        <line class="raindrop" x1="480" y1="400" x2="475" y2="430"/>
        <line class="raindrop" x1="580" y1="360" x2="575" y2="390"/>
        <line class="raindrop" x1="680" y1="390" x2="675" y2="420"/>
        <line class="raindrop" x1="780" y1="340" x2="775" y2="370"/>
        <line class="raindrop" x1="880" y1="410" x2="875" y2="440"/>
        <line class="raindrop" x1="980" y1="370" x2="975" y2="400"/>
        <line class="raindrop" x1="1080" y1="350" x2="1075" y2="380"/>
        <line class="raindrop" x1="50" y1="450" x2="45" y2="480"/>
        <line class="raindrop" x1="130" y1="480" x2="125" y2="510"/>
        <line class="raindrop" x1="230" y1="430" x2="225" y2="460"/>
        <line class="raindrop" x1="330" y1="500" x2="325" y2="530"/>
        <line class="raindrop" x1="430" y1="460" x2="425" y2="490"/>
        <line class="raindrop" x1="530" y1="490" x2="525" y2="520"/>
        <line class="raindrop" x1="630" y1="440" x2="625" y2="470"/>
        <line class="raindrop" x1="730" y1="510" x2="725" y2="540"/>
        <line class="raindrop" x1="830" y1="470" x2="825" y2="500"/>
        <line class="raindrop" x1="930" y1="450" x2="925" y2="480"/>
        <line class="raindrop" x1="1030" y1="490" x2="1025" y2="520"/>
        <line class="raindrop" x1="1130" y1="460" x2="1125" y2="490"/>
      </g>
      
      <!-- Lightning -->
      <g id="lightning">
        <path id="lightning-bolt" d="M580,50 L560,150 L590,150 L550,280 L600,200 L570,200 L620,100 Z" 
              fill="#ffffff" filter="url(#lightning-glow)" opacity="0"/>
      </g>
    </svg>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
