<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Skyline - Stormy Night</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="scene-container">
    <svg id="skyline-scene" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
      <defs>
        <!-- Stormy sky gradient -->
        <linearGradient id="sky-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1a0a2e"/>
          <stop offset="50%" stop-color="#2d1b4e"/>
          <stop offset="100%" stop-color="#0f1729"/>
        </linearGradient>
        
        <!-- Building gradient -->
        <linearGradient id="building-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1a1a2e"/>
          <stop offset="100%" stop-color="#0a0a15"/>
        </linearGradient>
        
        <!-- Lightning glow -->
        <filter id="lightning-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      
      <!-- Background -->
      <rect id="background" width="100%" height="100%" fill="url(#sky-gradient)"/>
      
      <!-- Flash overlay for lightning -->
      <rect id="flash-overlay" width="100%" height="100%" fill="#ffffff" opacity="0"/>
      
      <!-- City Skyline -->
      <g id="skyline">
        <!-- Building 1 - Far left (for archer) -->
        <path class="building" d="M0,600 L0,280 L50,280 L50,240 L80,220 L80,240 L110,240 L110,280 L160,280 L160,600 Z" fill="url(#building-gradient)"/>
        
        <!-- Building 2 - Archer position left -->
        <path class="building" id="building-2" d="M160,600 L160,320 L200,320 L200,280 L240,260 L240,280 L280,280 L280,320 L320,320 L320,600 Z" fill="url(#building-gradient)"/>
        
        <!-- Building 3 - Stepped -->
        <path class="building" d="M320,600 L320,380 L360,380 L360,340 L400,340 L400,300 L450,300 L450,600 Z" fill="url(#building-gradient)"/>
        
        <!-- Building 4 - Tall center -->
        <path class="building" d="M450,600 L450,260 L500,260 L500,220 L550,190 L550,220 L600,220 L600,260 L650,260 L650,600 Z" fill="url(#building-gradient)"/>
        
        <!-- Building 5 - Archer position right -->
        <path class="building" id="building-5" d="M650,600 L650,320 L700,320 L700,280 L740,260 L740,280 L780,280 L780,320 L820,320 L820,600 Z" fill="url(#building-gradient)"/>
      </g>
      
      <!-- Archers -->
      <g id="archers">
        <!-- Archer on left building (Building 2) - small ~35px tall -->
        <g id="archer-left" transform="translate(220, 260)">
          <!-- Red cape behind -->
          <path d="M-8,5 Q-15,15 -8,35 L8,35 Q15,15 8,5 Z" fill="#8b0000"/>
          <!-- Body with armor -->
          <path d="M-4,0 L-4,20 L-6,28 L6,28 L4,20 L4,0 Z" fill="#3a3a5a"/>
          <path d="M-4,0 L4,0 L4,5 L-4,5 Z" fill="#c0a040" stroke="#c0a040" stroke-width="1"/>
          <!-- Golden trim -->
          <path d="M-4,15 L4,15" stroke="#ffd700" stroke-width="2"/>
          <!-- Head with helmet -->
          <circle cx="0" cy="-6" r="5" fill="#4a4a6a"/>
          <path d="M-5,-8 L5,-8 L5,-11 L-5,-11 Z" fill="#c0a040"/>
          <!-- Bow -->
          <path class="bow" d="M12,-12 Q18,0 12,15" fill="none" stroke="#5a4a2a" stroke-width="2"/>
          <line class="bow-string" x1="12" y1="-12" x2="12" y2="15" stroke="#aaa" stroke-width="1"/>
          <!-- Arrow ready -->
          <g class="arrow-ready">
            <line x1="-20" y1="0" x2="20" y2="0" stroke="#5a4030" stroke-width="1.5"/>
            <path d="M20,0 L16,-2 L16,2 Z" fill="#5a4030"/>
          </g>
        </g>
        
        <!-- Archer on right building (Building 5) - facing left -->
        <g id="archer-right" transform="translate(720, 280) scale(-1, 1)">
          <!-- Red cape behind -->
          <path d="M-8,5 Q-15,15 -8,35 L8,35 Q15,15 8,5 Z" fill="#8b0000"/>
          <!-- Body with armor -->
          <path d="M-4,0 L-4,20 L-6,28 L6,28 L4,20 L4,0 Z" fill="#3a3a5a"/>
          <path d="M-4,0 L4,0 L4,5 L-4,5 Z" fill="#c0a040" stroke="#c0a040" stroke-width="1"/>
          <!-- Golden trim -->
          <path d="M-4,15 L4,15" stroke="#ffd700" stroke-width="2"/>
          <!-- Head with helmet -->
          <circle cx="0" cy="-6" r="5" fill="#4a4a6a"/>
          <path d="M-5,-8 L5,-8 L5,-11 L-5,-11 Z" fill="#c0a040"/>
          <!-- Bow -->
          <path class="bow" d="M12,-12 Q18,0 12,15" fill="none" stroke="#5a4a2a" stroke-width="2"/>
          <line class="bow-string" x1="12" y1="-12" x2="12" y2="15" stroke="#aaa" stroke-width="1"/>
          <!-- Arrow ready -->
          <g class="arrow-ready">
            <line x1="-20" y1="0" x2="20" y2="0" stroke="#5a4030" stroke-width="1.5"/>
            <path d="M20,0 L16,-2 L16,2 Z" fill="#5a4030"/>
          </g>
        </g>
      </g>
      
      <!-- Flying arrows -->
      <g id="arrows">
        <!-- Arrow from left archer - positioned at origin, CSS animates -->
        <g id="arrow-left" transform="translate(0, 0)">
          <line x1="0" y1="0" x2="25" y2="0" stroke="#5a4030" stroke-width="1.5"/>
          <polygon points="28,0 23,-2 23,2" fill="#5a4030"/>
        </g>
        <!-- Arrow from right archer -->
        <g id="arrow-right" transform="translate(0, 0) scale(-1, 1)">
          <line x1="0" y1="0" x2="25" y2="0" stroke="#5a4030" stroke-width="1.5"/>
          <polygon points="28,0 23,-2 23,2" fill="#5a4030"/>
        </g>
      </g>
      
      <!-- Rain layer -->
      <g id="rain">
        <line class="raindrop" x1="60" y1="30" x2="56" y2="55"/>
        <line class="raindrop" x1="140" y1="50" x2="136" y2="75"/>
        <line class="raindrop" x1="220" y1="20" x2="216" y2="45"/>
        <line class="raindrop" x1="300" y1="60" x2="296" y2="85"/>
        <line class="raindrop" x1="380" y1="40" x2="376" y2="65"/>
        <line class="raindrop" x1="460" y1="55" x2="456" y2="80"/>
        <line class="raindrop" x1="540" y1="25" x2="536" y2="50"/>
        <line class="raindrop" x1="620" y1="65" x2="616" y2="90"/>
        <line class="raindrop" x1="700" y1="45" x2="696" y2="70"/>
        <line class="raindrop" x1="780" y1="35" x2="776" y2="60"/>
        <line class="raindrop" x1="100" y1="90" x2="96" y2="115"/>
        <line class="raindrop" x1="180" y1="110" x2="176" y2="135"/>
        <line class="raindrop" x1="260" y1="80" x2="256" y2="105"/>
        <line class="raindrop" x1="340" y1="120" x2="336" y2="145"/>
        <line class="raindrop" x1="420" y1="100" x2="416" y2="125"/>
        <line class="raindrop" x1="500" y1="115" x2="496" y2="140"/>
        <line class="raindrop" x1="580" y1="85" x2="576" y2="110"/>
        <line class="raindrop" x1="660" y1="125" x2="656" y2="150"/>
        <line class="raindrop" x1="740" y1="95" x2="736" y2="120"/>
        <line class="raindrop" x1="80" y1="150" x2="76" y2="175"/>
        <line class="raindrop" x1="160" y1="170" x2="156" y2="195"/>
        <line class="raindrop" x1="240" y1="140" x2="236" y2="165"/>
        <line class="raindrop" x1="320" y1="180" x2="316" y2="205"/>
        <line class="raindrop" x1="400" y1="160" x2="396" y2="185"/>
        <line class="raindrop" x1="480" y1="175" x2="476" y2="200"/>
        <line class="raindrop" x1="560" y1="145" x2="556" y2="170"/>
        <line class="raindrop" x1="640" y1="185" x2="636" y2="210"/>
        <line class="raindrop" x1="720" y1="155" x2="716" y2="180"/>
      </g>
      
      <!-- Lightning -->
      <g id="lightning">
        <path id="lightning-bolt" d="M400,30 L385,100 L410,100 L380,200 L430,130 L405,130 L450,60 Z" 
              fill="#ffffff" filter="url(#lightning-glow)" opacity="0"/>
      </g>
    </svg>
  </div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
